# Smithery MCP registry manifest — https://smithery.ai/docs/deployments
# Published via: https://smithery.ai/new
name: trust-gate-mcp
version: 0.1.0
displayName: Trust Gate
description: Policy-gated AI decisions with Ed25519 cryptographic receipts. No receipt, no trust.
license: Apache-2.0
author: Cyber Warrior Network
homepage: https://cwn-trust-gate.onrender.com
repository: https://github.com/cyber-warrior-network/trust-gate-mcp
keywords:
  - trust
  - ai-safety
  - decision-trust
  - trustatom
  - ed25519
  - opa
  - policy
  - audit
  - compliance
  - eu-ai-act

startCommand:
  type: stdio
  command: uvx
  args:
    - trust-gate-mcp
  configSchema:
    type: object
    required:
      - trustGateApiKey
    properties:
      trustGateApiKey:
        type: string
        title: Trust Gate API Key
        description: Bearer token for the Trust Gate API. Get yours at https://cwn-trust-gate.onrender.com/pricing
        format: password
      trustGateUrl:
        type: string
        title: Trust Gate Base URL
        description: Override the default Trust Gate API endpoint (advanced).
        default: https://cwn-trust-gate.onrender.com
      trustGateTenant:
        type: string
        title: Default Tenant ID
        description: Tenant context for multi-tenant deployments.
        default: default
      trustGateTimeout:
        type: integer
        title: HTTP Timeout (seconds)
        description: Timeout for Trust Gate API calls.
        default: 30
        minimum: 5
        maximum: 120
  exampleConfig:
    trustGateApiKey: tg_live_your_key_here

tools:
  - name: gate_decision
    description: Submit an AI decision for OPA policy evaluation and Ed25519 receipt minting. Returns allow/deny, risk score, and signed TrustAtom receipt.
    riskLevel: medium
  - name: verify_receipt
    description: Mathematically verify a TrustAtom receipt's Ed25519 signature. Zero server trust required.
    riskLevel: low
  - name: check_policy
    description: Dry-run policy evaluation without minting a receipt. Use for pre-flight checks.
    riskLevel: low
  - name: health
    description: Check Trust Gate connectivity and service status.
    riskLevel: low

categories:
  - security
  - ai-safety
  - compliance
  - developer-tools
