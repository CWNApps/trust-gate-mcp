# Smithery deployment config -- container runtime (language-agnostic Python path).
# Reference (verified-or-ABSTAIN per AGENTS.md G5): the canonical schema reference page
# (smithery.ai/docs/build/project-config/smithery.yaml) is client-rendered and could not be
# fetched directly during research; runtime contract details below are confirmed by Smithery's
# publish.md + container-deployment docs. Treat field names as best-known; verify with
# `smithery validate` (or whatever the current CLI provides) before submission.
runtime: container
startCommand:
  type: http
  configSchema:
    type: object
    title: Trust Gate MCP configuration
    description: >-
      Trust Gate exposes post-quantum-signed receipt tools. No secrets are required at the
      gateway. The toggle below lets a deployer downgrade verification to Ed25519-only for
      legacy receipts; production deployments should keep it enabled.
    properties:
      require_pq:
        type: boolean
        title: Require post-quantum verification
        description: >-
          When true (default), verify_receipt FAILS if the ML-DSA-65 or SLH-DSA legs are
          missing -- defends against signature-stripping downgrade attacks. Disable only
          when verifying legacy Ed25519-only receipts.
        default: true
    required: []
  exampleConfig:
    require_pq: true
build:
  dockerfile: Dockerfile
  dockerBuildPath: "."
